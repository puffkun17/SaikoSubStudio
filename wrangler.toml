name = "saikosubstudio"
compatibility_date = "2025-06-01"
compatibility_flags = [ "nodejs_compat" ]
pages_build_output_dir = ".vercel/output/static"

# nodejs_compat is required for @cloudflare/next-on-pages
# because the adapter and some dependencies (jszip, etc.) use Node.js APIs.

# Secrets (sensitive values like API keys) must NOT be declared in this file.
#
# For the cf-pages-hosted (production) deployment on Cloudflare Pages:
# - Add sensitive keys (e.g. TMDB_API_KEY) **only** as "机密" (Secret / encrypted variable)
#   in the Cloudflare Pages dashboard:
#     Settings > Environment variables (Production) > Add
#     Name: TMDB_API_KEY
#     Value: your TMDB v4 Read Access Token (the JWT starting with eyJ...)
#     Type: 机密 (Secret)
#
# Do NOT put real secret values in wrangler.toml or anywhere in the repo.
# Using [vars] would register the key as a plain-text environment variable
# (managed by this file), which prevents proper Secret management in the dashboard.
#
# For local development:
# - Copy .env.example to .env.local and fill in TMDB_API_KEY (never commit .env.local)
# - Or run: wrangler pages dev .vercel/output/static --env production
#
# For the public main branch (open-source / self-host): users set their own key
# via .env.local or their own hosting provider's secrets. No keys are baked in.
