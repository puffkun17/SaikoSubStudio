name: Deploy SaikoSubStudio to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

# Node.js 20 deprecation handling (GitHub Actions runner).
# GitHub is deprecating Node 20 for action execution.
# We opt into Node 24 for the actions themselves using FORCE_JAVASCRIPT_ACTIONS_TO_NODE24.
# The actual build still uses Node 20 (via setup-node) because the project pins
# Next.js 15.5.2 + @cloudflare/next-on-pages ^1.13.5 for Cloudflare compatibility.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
#
# Long term: upgrade the CF adapter + Next.js so we can use modern Node for everything.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # --legacy-peer-deps is required for compatibility with current
        # @cloudflare/next-on-pages + Next 15.5.2 pin.
        run: npm ci --legacy-peer-deps

      - name: Build for Cloudflare Pages
        run: npm run pages:build

      - name: Verify Cloudflare build output
        run: |
          echo "Checking for .vercel/output/static ..."
          if [ ! -d ".vercel/output/static" ]; then
            echo "❌ ERROR: .vercel/output/static directory not found after pages:build"
            echo "Contents of .vercel/output (if any):"
            ls -la .vercel/output/ 2>/dev/null || echo "(no .vercel/output dir)"
            echo "This usually means the @cloudflare/next-on-pages build failed."
            echo "Check the 'Build for Cloudflare Pages' step logs above for the real error."
            exit 1
          fi
          echo "✅ Build output directory exists"
          echo "Top level contents:"
          ls -la .vercel/output/static | head -30

      # Use direct wrangler (from devDependencies) instead of wrangler-action
      # for better error logs and to avoid action-internal npx issues.
      # This also makes the command use the Node version we just set up.
      - name: Deploy to Cloudflare Pages
        run: |
          if [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            npx wrangler pages deploy .vercel/output/static \
              --project-name=saikosubstudio \
              --account-id "$CLOUDFLARE_ACCOUNT_ID"
          else
            npx wrangler pages deploy .vercel/output/static --project-name=saikosubstudio
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '' }}
        # IMPORTANT: The API token needs these minimum permissions (this exact error is very common):
        #   - User  → User Details → Read
        #   - Account → Pages → Edit   (strongly recommended to scope it to the correct account only)
        #
        # "Pages:Edit" alone is often NOT enough — Wrangler calls /memberships which requires User Details Read.
        #
        # How to create the token:
        # 1. https://dash.cloudflare.com/profile/api-tokens → Create Custom token
        # 2. Add the two permissions listed above
        # 3. Under "Account Resources", choose the specific account that owns your Pages project (don't use "All accounts")
        # 4. Create + copy the token
        # 5. In GitHub: repo Settings → Secrets and variables → Actions → New repository secret
        #    Name:  CLOUDFLARE_API_TOKEN
        #    Value: the token
        #
        # Optional but highly recommended:
        # - Also create a secret named CLOUDFLARE_ACCOUNT_ID (find it in the Cloudflare dashboard sidebar)
        #   This makes authentication more reliable and avoids some membership queries.

      - name: Deployment info
        run: |
          echo "✅ Deployment step completed."
          echo "Check the Cloudflare Pages dashboard for the live URL."
          echo "Project: saikosubstudio"
