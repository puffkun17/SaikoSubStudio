name: Deploy SaikoSubStudio to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

# Temporary opt-out for Node.js 20 actions deprecation warning.
# GitHub is forcing Node 24 on actions starting mid-June 2026.
# We keep Node 20 for now because the project pins Next.js 15.5.2 + @cloudflare/next-on-pages for compatibility.
# Remove this env (or set FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true) once the project is upgraded.
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # --legacy-peer-deps matches the project's historical workaround for CF adapter + Next 15
        run: npm ci --legacy-peer-deps

      - name: Build for Cloudflare Pages
        run: npm run pages:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy .vercel/output/static --project-name=saikosubstudio
        # Tip: Create a Cloudflare API token with "Pages:Edit" permission and add it as repo secret.
        # If this step fails with auth error, the secret is missing or has insufficient scope.

      - name: Deployment URL
        run: echo "Deployed! Check your Cloudflare Pages dashboard or the URL in the step above."
