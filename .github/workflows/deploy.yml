name: Deploy SaikoSubStudio to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare Pages
        run: npm run pages:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy .vercel/output/static --project-name=saikosubstudio
        # Tip: Create a Cloudflare API token with "Pages:Edit" permission and add it as repo secret.

      - name: Deployment URL
        run: echo "Deployed! Check your Cloudflare Pages dashboard or the URL in the step above."
